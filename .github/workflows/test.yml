name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src/pyhc_actions --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    env:
      INTEGRATION_FIXTURES: tests/fixtures/integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Keep in sync with both composite actions.
          version: "0.11.28"
          enable-cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test PHEP 3 checker CLI
        run: |
          phep3-check --generate-schedule --schedule-output test-schedule.json
          phep3-check \
            --schedule test-schedule.json \
            "$INTEGRATION_FIXTURES/pyproject.toml"

      - name: Test PHEP 3 uv metadata fallback
        uses: ./phep3-compliance
        with:
          schedule-path: test-schedule.json
          project-file: ${{ github.workspace }}/tests/fixtures/integration/legacy-package

      - name: Test successful PyHC env compatibility check
        run: |
          pyhc-env-compat-check \
            --packages "$INTEGRATION_FIXTURES/empty-packages.txt" \
            --constraints "$INTEGRATION_FIXTURES/constraints.txt" \
            --extras none \
            "$INTEGRATION_FIXTURES/pyproject.toml"

      - name: Test missing PyHC baseline package attribution
        run: |
          if pyhc-env-compat-check \
            --packages "$INTEGRATION_FIXTURES/missing-baseline-packages.txt" \
            --constraints "$INTEGRATION_FIXTURES/constraints.txt" \
            --extras none \
            "$INTEGRATION_FIXTURES/pyproject.toml" \
            > missing-baseline-output.txt 2>&1; then
            echo "Expected the missing baseline check to fail"
            exit 1
          fi

          grep -F "PyHC Environment baseline package unavailable from package registry" missing-baseline-output.txt
          grep -F "Your package's compatibility could not be evaluated" missing-baseline-output.txt
          grep -F "your package is not implicated" missing-baseline-output.txt
          grep -F "Contact PyHC Environment maintainers" missing-baseline-output.txt

          if grep -Fq "Your requirement:" missing-baseline-output.txt; then
            echo "The baseline failure was incorrectly attributed to the downstream package"
            cat missing-baseline-output.txt
            exit 1
          fi
