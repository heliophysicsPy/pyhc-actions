name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the vMAJOR.MINOR.PATCH format"
            exit 1
          fi

      - name: Find previous immutable release tag
        id: release_tags
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PREVIOUS_TAG=""
          while IFS= read -r TAG; do
            if [[ "$TAG" != "$RELEASE_TAG" && "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              PREVIOUS_TAG="$TAG"
              break
            fi
          done < <(git tag --list 'v*.*.*' --sort=-version:refname)
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q

      - name: Generate fresh schedule.json
        env:
          PYTHONPATH: src
        run: |
          python -c "from pyhc_actions.phep3.pypi_fetcher import update_schedule_file; update_schedule_file('schedule.json')"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          previous_tag: ${{ steps.release_tags.outputs.previous_tag }}
          files: |
            schedule.json
          body: |
            ## PyHC Actions ${{ github.ref_name }}

            ### Usage

            **PHEP 3 Compliance Checker:**
            ```yaml
            - uses: heliophysicsPy/pyhc-actions/phep3-compliance@${{ github.ref_name }}
            ```

            **PyHC Environment Compatibility Checker:**
            ```yaml
            - uses: heliophysicsPy/pyhc-actions/pyhc-env-compat@${{ github.ref_name }}
            ```

            ### Included Files
            - `schedule.json` - Current release schedule for Python and core Scientific Python packages
